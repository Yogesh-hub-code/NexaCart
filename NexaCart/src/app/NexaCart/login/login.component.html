<div class="login-page">
  <div class="login-card">
    <h1>NexaCart Login</h1>
    <p class="subtitle">Sign in with your NexaCart account.</p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate>
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        [(ngModel)]="email"
        #emailModel="ngModel"
      />
      <div class="field-error" *ngIf="emailModel.invalid && emailModel.touched">
        Email is required.
      </div>

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        minlength="6"
        [(ngModel)]="password"
        #passwordModel="ngModel"
      />
      <div class="field-error" *ngIf="passwordModel.invalid && passwordModel.touched">
        Password is required.
      </div>

      <button type="submit" [disabled]="loginInProgress">
        {{ loginInProgress ? 'Signing in…' : 'Login' }}
      </button>
    </form>

    <div class="message" *ngIf="message" [class.error]="isError" [class.success]="!isError">
      {{ message }}
    </div>
  </div>
</div>
