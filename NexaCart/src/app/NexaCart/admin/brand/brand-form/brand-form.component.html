<div class="container">
  <div class="card">
    <h2>{{ isEditMode ? 'Update Brand' : 'Add Brand' }}</h2>

    <div class="form-group">
      <label>Brand Name *</label>
      <input type="text" [(ngModel)]="name" placeholder="Enter brand name" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea rows="4" [(ngModel)]="description"></textarea>
    </div>

    <div class="form-group checkbox-row">
      <label>
        <input type="checkbox" [(ngModel)]="isActive" />
        Active
      </label>
    </div>

    <div class="buttons">
      <button class="save" type="button" (click)="saveBrand()">{{ isEditMode ? 'Update Brand' : 'Save Brand' }}</button>
      <button class="cancel" type="button" routerLink="/admin/brands">Cancel</button>
    </div>

    <p class="message">{{ message }}</p>
  </div>
</div>
