<div class="ad-shell">

  <!-- Sidebar -->
  <aside class="ad-sidebar">
    <a class="ad-logo" routerLink="/">
      <div class="ad-logo-icon"><span>N</span></div>
      <span class="ad-logo-text">Nexa<em>Cart</em></span>
    </a>
    <nav class="ad-nav">
      <span class="ad-nav-label">Management</span>
      <a routerLink="/admin" routerLinkActive="ad-nav-link--active" [routerLinkActiveOptions]="{exact:true}" class="ad-nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a routerLink="/admin/categories" routerLinkActive="ad-nav-link--active" class="ad-nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Categories
      </a>
    </nav>
    <a routerLink="/" class="ad-back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Store
    </a>
  </aside>

  <!-- Main -->
  <div class="ad-main">

    <header class="ad-topbar">
      <div>
        <p class="ad-page-label">Admin / Categories / {{ isEditMode ? 'Edit' : 'Add' }}</p>
        <h1 class="ad-page-title">{{ isEditMode ? 'Edit Category' : 'New Category' }}</h1>
      </div>
      <a routerLink="/admin/categories" class="ad-btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to List
      </a>
    </header>

    <!-- Form card -->
    <div class="ad-form-card">

      <form (ngSubmit)="saveCategory()" class="ad-form">

        <div class="ad-field">
          <label for="cat-name">
            Category Name
            <span class="ad-required">*</span>
          </label>
          <input
            type="text"
            id="cat-name"
            [(ngModel)]="name"
            name="name"
            placeholder="e.g. Electronics, Fashion…"
            [class.ad-input--error]="message && !name.trim()"
          />
        </div>

        <div class="ad-field">
          <label for="cat-desc">Description</label>
          <textarea
            id="cat-desc"
            [(ngModel)]="description"
            name="description"
            rows="4"
            placeholder="Brief description of this category…">
          </textarea>
        </div>

        <!-- Message -->
        <div class="ad-form-msg ad-form-msg--success" *ngIf="message && !message.includes('Failed') && !message.includes('required')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          {{ message }}
        </div>
        <div class="ad-form-msg ad-form-msg--error" *ngIf="message && (message.includes('Failed') || message.includes('required'))">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ message }}
        </div>

        <div class="ad-form-actions">
          <a routerLink="/admin/categories" class="ad-btn-ghost">Cancel</a>
          <button type="submit" class="ad-btn-primary" [disabled]="isLoading">
            <span class="ad-spinner ad-spinner--sm" *ngIf="isLoading"></span>
            <svg *ngIf="!isLoading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            {{ isLoading ? 'Saving…' : (isEditMode ? 'Update Category' : 'Save Category') }}
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
