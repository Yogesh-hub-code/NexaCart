<article class="nc-card" [style.animation-delay]="animDelay + 'ms'">

  <!-- Image area -->
  <div class="nc-card-img-wrap">
    <img [src]="product.image" [alt]="product.name" loading="lazy" class="nc-card-img" />
    <div class="nc-card-scrim"></div>

    <!-- Badge -->
    <span class="nc-card-badge" *ngIf="product.badge" [ngClass]="getBadgeClass(product.badge)">
      {{ product.badge }}
    </span>

    <!-- Wishlist -->
    <button
      type="button"
      class="nc-card-wish"
      [class.nc-card-wish--active]="isWishlisted"
      (click)="wishlistToggled.emit(product); $event.stopPropagation()"
      aria-label="Toggle wishlist"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="nc-card-body">
    <div class="nc-card-meta">
      <span class="nc-card-brand">{{ product.brand }}</span>
      <div class="nc-card-rating">
        <svg viewBox="0 0 24 24" fill="#f59e0b" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>{{ product.rating }}</span>
        <span class="nc-card-reviews">({{ product.reviews }})</span>
      </div>
    </div>

    <h3 class="nc-card-name">{{ product.name }}</h3>

    <div class="nc-card-pricing">
      <span class="nc-card-price">${{ product.price }}</span>
      <span class="nc-card-orig" *ngIf="product.originalPrice">${{ product.originalPrice }}</span>
      <span class="nc-card-disc" *ngIf="product.discount">-{{ product.discount }}%</span>
    </div>

    <div class="nc-card-actions">
      <button
        type="button"
        class="nc-card-bag"
        (click)="addToCart.emit(product); $event.stopPropagation()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Add to Bag
      </button>
      <button
        type="button"
        class="nc-card-buy"
        (click)="buyNow.emit(product); $event.stopPropagation()"
        aria-label="Buy now"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </button>
    </div>
  </div>

</article>
